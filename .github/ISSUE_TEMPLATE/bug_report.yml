name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please make sure you're on the latest version before filing.

        **Before you file:**
        1. [Search existing issues](https://github.com/DriveWealth/copilot-context-mode/issues) to make sure this hasn't been reported already
        2. Pull the latest version and rebuild
        3. Restart your Copilot session
        4. If the issue persists on the latest version, file this report

  - type: input
    id: version
    attributes:
      label: copilot-context-mode version
      description: Check your package.json for the version.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Prompt that triggered the bug
      description: |
        Paste the exact prompt (message) you sent to Copilot when the bug occurred.
        This is critical for reproduction.
      render: text
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug. What went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to reproduce the issue.
      placeholder: |
        1. Send prompt: "..."
        2. Copilot calls tool `execute` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: debug-logs
    attributes:
      label: Debug logs
      description: Paste any error messages, MCP server logs, or tool output.
      render: text
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: JS Runtime
      description: "Bun or Node version"
      placeholder: "e.g. bun 1.3.4"
    validations:
      required: false
